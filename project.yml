name: MacosStatsWidget

options:
  minimumXcodeGenVersion: 2.39.0
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: T34G959ZG8
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGNING_ALLOWED: YES

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0

targets:
  MacosStatsWidget:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    productName: MacosStatsWidget
    sources:
      - path: MacosStatsWidget/Apps/MainApp
      - path: MacosStatsWidget/Shared
    dependencies:
      - target: MacosStatsWidgetWidget
        embed: true
        codeSign: true
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethansk.macos-stats-widget
        INFOPLIST_FILE: MacosStatsWidget/Apps/MainApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacosStatsWidget/Apps/MainApp/MacosStatsWidget.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MacosStatsWidget/Apps/MainApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: MacosStatsWidget
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "0.12.2"
        CFBundleVersion: "1202"
        CFBundleDocumentTypes:
          - CFBundleTypeName: MacosStatsWidget Selector Pack
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.ethansk.macos-stats-widget.selectorpack
        CFBundleURLTypes:
          - CFBundleURLName: MacosStatsWidget
            CFBundleURLSchemes:
              - macos-stats-widget
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSPrincipalClass: NSApplication
        SUEnableAutomaticChecks: true
        SUFeedURL: https://ethansk.github.io/macos-stats-widget/appcast.xml
        SUPublicEDKey: 9PG32PH1UFbECc644qjE4OQtpiILuiPCOUuXvgND2tA=
        SUScheduledCheckInterval: 86400
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.ethansk.macos-stats-widget.selectorpack
            UTTypeDescription: MacosStatsWidget Selector Pack
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - selectorpack
              public.mime-type:
                - application/vnd.macos-stats-widget.selectorpack+json
    entitlements:
      path: MacosStatsWidget/Apps/MainApp/MacosStatsWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.application-groups:
          - group.com.ethansk.macos-stats-widget
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.ethansk.macos-stats-widget"

  MacosStatsWidgetWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "13.0"
    productName: MacosStatsWidgetWidget
    sources:
      - path: MacosStatsWidget/Apps/WidgetExtension
      - path: MacosStatsWidget/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethansk.macos-stats-widget.widget
        INFOPLIST_FILE: MacosStatsWidget/Apps/WidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacosStatsWidget/Apps/WidgetExtension/MacosStatsWidgetWidget.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
    info:
      path: MacosStatsWidget/Apps/WidgetExtension/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: MacosStatsWidgetWidget
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "0.12.2"
        CFBundleVersion: "1202"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: MacosStatsWidget/Apps/WidgetExtension/MacosStatsWidgetWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.ethansk.macos-stats-widget

  MacosStatsWidgetCLI:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    productName: macos-stats-widget
    sources:
      - path: MacosStatsWidget/Apps/CLI
      - path: MacosStatsWidget/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethansk.macos-stats-widget.cli
        INFOPLIST_FILE: MacosStatsWidget/Apps/CLI/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacosStatsWidget/Apps/CLI/MacosStatsWidgetCLI.entitlements
    info:
      path: MacosStatsWidget/Apps/CLI/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "0.12.2"
        CFBundleVersion: "1202"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
    entitlements:
      path: MacosStatsWidget/Apps/CLI/MacosStatsWidgetCLI.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.ethansk.macos-stats-widget
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.ethansk.macos-stats-widget"

schemes:
  MacosStatsWidget:
    build:
      targets:
        MacosStatsWidget: all
    run:
      config: Debug
    archive:
      config: Release

  MacosStatsWidgetWidget:
    build:
      targets:
        MacosStatsWidgetWidget: all
    run:
      config: Debug
    archive:
      config: Release

  MacosStatsWidgetCLI:
    build:
      targets:
        MacosStatsWidgetCLI: all
    run:
      config: Debug
    archive:
      config: Release
